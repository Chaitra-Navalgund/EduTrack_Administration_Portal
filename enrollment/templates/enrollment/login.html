{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Admin Login - EduTrack</title>
    <style>
      :root {
        --primary: #0f172a;
        --secondary: #3b82f6;
        --accent: #fbbf24;
        --white: #ffffff;
        --bg: #f8fafc;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at 10% 20%, var(--primary) 0%, #1e293b 90%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
      }

      .login-container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        padding: 3rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 420px;
        animation: zoomIn 0.8s;
      }

      .login-header h1 {
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
      }

      .login-header h1 span {
          color: var(--accent);
      }

      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 0.8rem 1rem;
        color: white !important;
        height: auto;
        transition: all 0.3s;
      }

      .form-control::placeholder {
          color: rgba(255, 255, 255, 0.5);
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: var(--secondary);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
      }

      .btn-signin {
        background: var(--secondary);
        border: none;
        border-radius: 12px;
        padding: 0.8rem;
        font-weight: 700;
        color: white;
        transition: all 0.3s;
        margin-top: 1rem;
      }

      .btn-signin:hover {
        background: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
      }

      .input-icon-wrapper {
        position: relative;
      }

      .input-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.5);
      }

      .alert-custom {
          background: rgba(239, 68, 68, 0.2);
          border: 1px solid rgba(239, 68, 68, 0.3);
          color: #fecaca;
          border-radius: 12px;
          font-weight: 500;
          font-size: 0.9rem;
      }

      .back-link {
          color: rgba(255, 255, 255, 0.6);
          font-weight: 600;
          text-decoration: none;
          transition: 0.3s;
      }

      .back-link:hover {
          color: var(--accent);
          text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container d-flex justify-content-center">
        <div class="login-container">
            <div class="login-header text-center mb-5">
                <i class="fas fa-graduation-cap fa-3x mb-3" style="color: var(--accent);"></i>
                <h1>Edu<span>Track</span></h1>
                <p class="text-muted small">ADMINISTRATION PORTAL</p>
            </div>
            
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-custom animate__animated animate__shakeX">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="form-group mb-4">
                    <div class="input-icon-wrapper">
                        <input type="text" class="form-control" name="username" placeholder="Username" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>
                
                <div class="form-group mb-4">
                    <div class="input-icon-wrapper">
                        <input type="password" name="password" class="form-control" id="password" placeholder="Password" required>
                        <i class="fas fa-lock input-icon" id="togglePassword" style="cursor: pointer;"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-signin btn-block">
                    SIGN IN TO DASHBOARD
                </button>
                
                <div class="text-center mt-4">
                     <a href="{% url 'index' %}" class="back-link small">
                         <i class="fas fa-arrow-left mr-1"></i> Return to Site
                     </a>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>
    <script type="text/javascript">
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.classList.remove('fa-lock');
                this.classList.add('fa-unlock');
            } else {
                passwordInput.type = 'password';
                this.classList.remove('fa-unlock');
                this.classList.add('fa-lock');
            }
        });
    </script>
  </body>
</html>
