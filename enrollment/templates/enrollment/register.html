{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <title>Registration - Admin Dashboard</title>
    <style>
      body {
        background: linear-gradient(135deg, #00b894, #00cec9);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }
      .register-container {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
        padding: 40px 30px;
        backdrop-filter: blur(10px);
      }
      .register-header h1 {
        color: #00b894;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .form-control {
        border-radius: 8px;
        border: 2px solid #e1e1e1;
      }
      .btn-register {
        background: linear-gradient(45deg, #00b894, #00cec9);
        border: none;
        border-radius: 30px;
        padding: 12px 30px;
        font-weight: 600;
        color: white;
        transition: all 0.3s;
      }
      .btn-register:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 184, 148, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="register-container animate__animated animate__zoomIn">
                    <div class="register-header text-center">
                        <h1>Register Admin</h1>
                        <p class="text-muted">Create a new administrative account</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="name">Full Name</label>
                                <input type="text" name="name" class="form-control" id="name" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="email">Email Address</label>
                                <input type="email" name="email" class="form-control" id="email" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" name="username" class="form-control" id="username" required>
                            <small class="text-muted">Must be at least 8 characters</small>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="password">Password</label>
                                <input type="password" name="password" class="form-control" id="password" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="c_password">Confirm Password</label>
                                <input type="password" name="c_password" class="form-control" id="c_password" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="photo">Profile Photo</label>
                            <input type="file" name="photo" class="form-control-file" id="photo" required>
                        </div>
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-register btn-block">Register Account</button>
                            <p class="mt-3">Already have an account? <a href="{% url 'admin_login' %}">Login here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
  </body>
</html>
