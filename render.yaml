services:
  - type: web
    name: edutrack-administration-portal
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn student_enrollment.wsgi:application"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ADMIN_NAME
        value: "Admin User"
      - key: ADMIN_EMAIL
        value: "admin@example.com"
      - key: ADMIN_USERNAME
        value: "adminuser"
      - key: ADMIN_PASSWORD
        sync: false
